<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard | Lida Website</title>
    <meta name="description" content="Real-time analytics dashboard for Lida Website – monitor traffic, visitors, and top pages.">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-base:        #0a0d14;
            --bg-surface:     #111520;
            --bg-card:        rgba(255,255,255,0.04);
            --bg-card-hover:  rgba(255,255,255,0.07);
            --border:         rgba(255,255,255,0.08);
            --border-bright:  rgba(255,255,255,0.14);
            --text-primary:   #f0f4ff;
            --text-secondary: #8b96b0;
            --text-muted:     #f0f4ff;
            --accent-blue:    #3b82f6;
            --accent-blue-glow: rgba(59,130,246,0.25);
            --accent-emerald: #10b981;
            --accent-purple:  #8b5cf6;
            --accent-amber:   #f59e0b;
            --radius-lg:      16px;
            --radius-xl:      22px;
            --shadow-card:    0 4px 24px rgba(0,0,0,0.4);
            --transition:     0.22s cubic-bezier(0.4,0,0.2,1);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─── Animated background grid ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* ─── Glowing orbs ─── */
        body::after {
            content: '';
            position: fixed;
            top: -200px; left: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 8s ease-in-out infinite alternate;
        }

        @keyframes orbFloat {
            from { transform: translate(0,0); }
            to   { transform: translate(80px, 60px); }
        }

        /* ─── NAV ─── */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 68px;
            background: rgba(10,13,20,0.85);
            backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 15px;
            box-shadow: 0 0 18px rgba(59,130,246,0.45);
        }

        .nav-title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text-primary);
        }

        .nav-title span { color: var(--accent-blue); }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        #lastUpdated {
            font-size: 0.78rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pulse-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent-emerald);
            box-shadow: 0 0 8px var(--accent-emerald);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.75); }
        }

        .refresh-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: var(--transition);
        }

        .refresh-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-bright);
            color: var(--text-primary);
        }

        .refresh-btn.spinning i { animation: spin 0.6s linear infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── MAIN ─── */
        main {
            position: relative;
            z-index: 1;
            max-width: 1280px;
            margin: 0 auto;
            padding: 40px 28px 60px;
        }

        /* ─── SECTION HEADER ─── */
        .section-header {
            margin-bottom: 32px;
        }

        .section-header h2 {
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #f0f4ff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ─── KPI CARDS ─── */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-card);
            transition: var(--transition);
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: var(--transition);
            border-radius: inherit;
        }

        .kpi-card.blue::before   { background: linear-gradient(135deg, rgba(59,130,246,0.08), transparent); }
        .kpi-card.emerald::before { background: linear-gradient(135deg, rgba(16,185,129,0.08), transparent); }
        .kpi-card.purple::before  { background: linear-gradient(135deg, rgba(139,92,246,0.08), transparent); }

        .kpi-card:hover { transform: translateY(-3px); border-color: var(--border-bright); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .kpi-card:hover::before { opacity: 1; }

        .kpi-info { position: relative; z-index: 1; }

        .kpi-label {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            color: white';
            margin-bottom: 10px;
        }

        .kpi-value {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .kpi-value.counting { color: var(--accent-blue); }

        .kpi-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            position: relative; z-index: 1;
        }

        .kpi-card.blue .kpi-icon    { background: rgba(59,130,246,0.15);  color: var(--accent-blue); }
        .kpi-card.emerald .kpi-icon { background: rgba(16,185,129,0.15);  color: var(--accent-emerald); }
        .kpi-card.purple .kpi-icon  { background: rgba(139,92,246,0.15);  color: var(--accent-purple); }
        .kpi-card.amber .kpi-icon   { background: rgba(245,158,11,0.15);  color: var(--accent-amber); }

        .kpi-card.amber::before { background: linear-gradient(135deg, rgba(245,158,11,0.08), transparent); }


        /* ─── CHART CARD ─── */
        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 28px;
            box-shadow: var(--shadow-card);
            margin-bottom: 32px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title i { color: var(--accent-blue); font-size: 14px; }

        .card-badge {
            font-size: 0.72rem;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(59,130,246,0.12);
            color: var(--accent-blue);
            border: 1px solid rgba(59,130,246,0.2);
        }

        .chart-wrapper {
            position: relative;
            height: 280px;
            width: 100%;
        }

        /* ─── TABLE CARD ─── */
        .table-card {
            background: var(--bg-card);
            border: 12px solid var(--border);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }

        .table-card .card-header {
            padding: 20px 28px;
            border-bottom: 4px solid var(--border);
            margin-bottom: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(255,255,255,0.02);
        }

        thead th {
            padding: 12px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.9px;
            text-transform: uppercase;
            color: var(--text-muted);
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background var(--transition);
        }

        tbody tr:last-child { border-bottom: none; }

        tbody tr:hover { background: rgba(255,255,255,0.03); }

        tbody td {
            padding: 14px 24px;
            font-size: 18px;
            color: var(--text-secondary);
            vertical-align: middle;
        }

        .path-pill {
            font-family: 'Courier New', monospace;
            font-size: 18px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .referrer-link {
            color: var(--accent-blue);
            font-size: 18px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px;
            display: block;
            text-decoration: none;
        }

        .referrer-link:hover { text-decoration: underline; }

        .direct-label {
            color: var(--text-muted);
            font-style: italic;
            font-size: 18px;
        }

        .country-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 1px;
        }

        .time-str {
            font-size: 18px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* ─── Empty / Error state ─── */
        .state-row td {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .error-text { color: #f87171; }

        /* ─── Group-by bar ─── */
        .group-bar {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .group-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-right: 4px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .group-btn {
            font-family: 'Inter', sans-serif;
            font-size: 0.74rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .group-btn:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
        }

        .group-btn.active {
            background: rgba(59,130,246,0.15);
            border-color: rgba(59,130,246,0.35);
            color: var(--accent-blue);
        }

        /* ─── Count bar (grouped view) ─── */
        .count-bar-wrap { display: flex; align-items: center; gap: 10px; }
        .count-bar {
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            min-width: 4px;
            transition: width 0.4s ease;
        }
        .count-num { font-size: 0.8rem; font-weight: 700; color: var(--text-primary); min-width: 20px; }

        /* ─── Fade-in animation ─── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .kpi-card { animation: fadeUp 0.5s ease both; }
        .kpi-card:nth-child(1) { animation-delay: 0.05s; }
        .kpi-card:nth-child(2) { animation-delay: 0.12s; }
        .kpi-card:nth-child(3) { animation-delay: 0.19s; }

        .chart-card  { animation: fadeUp 0.5s 0.25s ease both; }
        .table-card  { animation: fadeUp 0.5s 0.35s ease both; }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* ─── Period Selector ─── */
        .period-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 5px;
        }

        .period-btn {
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .period-btn:hover {
            color: var(--text-secondary);
            background: rgba(255,255,255,0.05);
        }

        .period-btn.active {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: #fff;
            box-shadow: 0 2px 12px rgba(59,130,246,0.35);
        }

        .header-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        /* ─── Trend badges ─── */
        .kpi-trend {
            margin-top: 8px;
            font-size: 0.72rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .trend-up   { color: #10b981; }
        .trend-down { color: #f87171; }
        .trend-flat { color: var(--text-muted); }

        /* ─── Table toolbar ─── */
        .table-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.01);
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 180px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 12px 7px 34px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            outline: none;
            transition: var(--transition);
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { border-color: var(--border-bright); background: rgba(255,255,255,0.07); }

        .search-wrap { position: relative; flex: 1; min-width: 180px; }
        .search-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 12px; pointer-events: none; }

        .export-btn {
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            transition: var(--transition);
        }
        .export-btn:hover { background: rgba(255,255,255,0.06); border-color: var(--border-bright); color: var(--text-primary); }

        /* ─── Flag emoji ─── */
        .flag { font-size: 1.1em; margin-right: 4px; }

        /* ─── Referrer domain chip ─── */
        .referrer-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--accent-blue);
            font-size: 0.82rem;
            text-decoration: none;
        }
        .referrer-chip:hover { text-decoration: underline; }
        .referrer-favicon { width: 14px; height: 14px; border-radius: 2px; }

        /* ─── Empty state ─── */
        .empty-state { text-align:center; padding: 56px 24px; }
        .empty-state i { font-size: 2rem; color: var(--text-muted); margin-bottom: 12px; display:block; }
        .empty-state p { color: var(--text-muted); font-size: 0.88rem; }
        .empty-state strong { color: var(--text-secondary); display:block; margin-bottom:4px; font-size:1rem; }

        /* ─── Responsive ─── */
        @media (max-width: 640px) {
            nav { padding: 0 16px; }
            main { padding: 24px 14px 40px; }
            .kpi-value { font-size: 1.9rem; }
            .nav-title span { display: none; }
            .period-btn { padding: 5px 10px; font-size: 0.72rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-brand">
            <div class="nav-icon"><i class="fa-solid fa-chart-line"></i></div>
            <span class="nav-title">Lida Software <span>Website</span> Analytics</span>
        </div>
        <div class="nav-right">
            <span id="lastUpdated">
                <span class="pulse-dot"></span>
                Loading…
            </span>
            <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">
                <i class="fa-solid fa-rotate-right"></i> Refresh
            </button>
        </div>
    </nav>

    <main>

        <div class="header-row">
            <div class="section-header" style="margin-bottom:0">
                <h2>Traffic Overview</h2>
                <p>Real-time visitor activity and page performance metrics</p>
            </div>
            <div class="period-bar" id="periodBar">
                <button class="period-btn" data-period="today" onclick="setPeriod('today')">Today</button>
                <button class="period-btn active" data-period="7d" onclick="setPeriod('7d')">7 Days</button>
                <button class="period-btn" data-period="14d" onclick="setPeriod('14d')">14 Days</button>
                <button class="period-btn" data-period="30d" onclick="setPeriod('30d')">30 Days</button>
                <button class="period-btn" data-period="all" onclick="setPeriod('all')">All Time</button>
            </div>
        </div>

        <!-- KPI Cards -->
        <div class="kpi-grid">
            <div class="kpi-card blue">
                <div class="kpi-info">
                    <p class="kpi-label">Total Views</p>
                    <h3 class="kpi-value" id="kpiTotalViews">--</h3>
                    <div class="kpi-trend" id="trendViews"></div>
                </div>
                <div class="kpi-icon"><i class="fa-regular fa-eye"></i></div>
            </div>

            <div class="kpi-card emerald">
                <div class="kpi-info">
                    <p class="kpi-label">Unique Visitors</p>
                    <h3 class="kpi-value" id="kpiUniqueVisitors">--</h3>
                    <div class="kpi-trend" id="trendVisitors"></div>
                </div>
                <div class="kpi-icon"><i class="fa-solid fa-users"></i></div>
            </div>

            <div class="kpi-card purple">
                <div class="kpi-info">
                    <p class="kpi-label">Top Country</p>
                    <h3 class="kpi-value" id="kpiTopCountry">--</h3>
                    <div class="kpi-trend" id="trendCountry"></div>
                </div>
                <div class="kpi-icon"><i class="fa-solid fa-globe"></i></div>
            </div>

            <div class="kpi-card amber">
                <div class="kpi-info">
                    <p class="kpi-label">Top Page</p>
                    <h3 class="kpi-value" id="kpiTopPage" style="font-size:1.4rem;letter-spacing:-0.5px">--</h3>
                    <div class="kpi-trend" id="trendPage"></div>
                </div>
                <div class="kpi-icon"><i class="fa-solid fa-file-lines"></i></div>
            </div>
        </div>

        <!-- Chart -->
        <div class="chart-card">
            <div class="card-header">
                <span class="card-title"><i class="fa-solid fa-chart-bar"></i> Views by Page</span>
                <span class="card-badge" id="chartBadge">7 Days</span>
            </div>
            <div class="chart-wrapper">
                <canvas id="trafficChart"></canvas>
            </div>
        </div>

        <!-- Table -->
        <div class="table-card">
            <div class="card-header">
                <span class="card-title"><i class="fa-solid fa-table-list"></i> Recent Traffic Log</span>
                <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
                    <div class="group-bar">
                        <span class="group-label">Group by:</span>
                        <button class="group-btn active" data-group="none"     onclick="setGroup('none')">Raw</button>
                        <button class="group-btn"        data-group="path"     onclick="setGroup('path')">Path</button>
                        <button class="group-btn"        data-group="referrer" onclick="setGroup('referrer')">Referrer</button>
                        <button class="group-btn"        data-group="country"  onclick="setGroup('country')">Country</button>
                    </div>
                    <span class="card-badge" id="rowCount">0 entries</span>
                </div>
            </div>
            <!-- Search + Export toolbar -->
            <div class="table-toolbar">
                <div class="search-wrap">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input class="search-input" id="tableSearch" type="text"
                           placeholder="Filter by path, referrer, country…"
                           oninput="applySearch()">
                </div>
                <button class="export-btn" onclick="exportCSV()">
                    <i class="fa-solid fa-download"></i> Export CSV
                </button>
            </div>
            <div style="overflow-x:auto;">
                <table id="trafficTable">
                    <thead>
                        <tr>
                            <th>Path</th>
                            <th>Referrer</th>
                            <th>Country</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr class="state-row">
                            <td colspan="4">
                                <i class="fa-solid fa-circle-notch fa-spin" style="margin-right:8px;color:var(--accent-blue)"></i>
                                Loading analytics data…
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        // ─── Config ───────────────────────────────────────────────────────────────
        const API_ENDPOINT = '/api/analytics/views';
        const USE_MOCK = false; // Set to false when your NestJS API is ready

        let chartInstance = null;
        let activePeriod  = '7d';

        // ─── Mock dataset — spread across realistic date ranges ───────────────────
        const MOCK_ALL = [
            { id:1,  path:'/',           referrer:'https://google.com',  country:'IL', visitor_hash:'a1b2', created_at: daysAgo(0)  },
            { id:2,  path:'/tools/json', referrer:'https://google.com',  country:'IL', visitor_hash:'a1b2', created_at: daysAgo(0)  },
            { id:3,  path:'/about',      referrer:null,                  country:'US', visitor_hash:'c3d4', created_at: daysAgo(1)  },
            { id:4,  path:'/',           referrer:'https://github.com',  country:'GB', visitor_hash:'e5f6', created_at: daysAgo(3)  },
            { id:5,  path:'/dashboard',  referrer:'https://t.co',        country:'IL', visitor_hash:'g7h8', created_at: daysAgo(5)  },
            { id:6,  path:'/tools/json', referrer:'https://bing.com',    country:'DE', visitor_hash:'i9j0', created_at: daysAgo(8)  },
            { id:7,  path:'/about',      referrer:null,                  country:'FR', visitor_hash:'k1l2', created_at: daysAgo(10) },
            { id:8,  path:'/',           referrer:'https://reddit.com',  country:'US', visitor_hash:'m3n4', created_at: daysAgo(12) },
            { id:9,  path:'/dashboard',  referrer:'https://google.com',  country:'IL', visitor_hash:'o5p6', created_at: daysAgo(16) },
            { id:10, path:'/tools/json', referrer:null,                  country:'CA', visitor_hash:'q7r8', created_at: daysAgo(20) },
            { id:11, path:'/',           referrer:'https://github.com',  country:'AU', visitor_hash:'s9t0', created_at: daysAgo(25) },
            { id:12, path:'/about',      referrer:'https://google.com',  country:'IL', visitor_hash:'u1v2', created_at: daysAgo(28) },
            { id:13, path:'/',           referrer:null,                  country:'US', visitor_hash:'w3x4', created_at: daysAgo(35) },
            { id:14, path:'/dashboard',  referrer:'https://t.co',        country:'GB', visitor_hash:'y5z6', created_at: daysAgo(45) },
        ];

        function daysAgo(n) {
            const d = new Date();
            d.setDate(d.getDate() - n);
            return d.toISOString();
        }

        // ─── Period label map ─────────────────────────────────────────────────────
        const PERIOD_LABELS = { today:'Today', '7d':'Last 7 Days', '14d':'Last 14 Days', '30d':'Last 30 Days', all:'All Time' };

        // ─── Path label map & formatter ──────────────────────────────────────────
        // Add known routes here for instant friendly names.
        // Anything not listed is auto-prettified (segments capitalised, joined with ›).
        const PATH_LABELS = {
            '/':             'Home',
            '/about':        'About',
            '/dashboard':    'Dashboard',
            '/tools':        'Tools',
            '/tools/json':   'Tools › JSON',
            '/tools/base64': 'Tools › Base64',
            '/contact':      'Contact',
            '/blog':         'Blog',
            '/pricing':      'Pricing',
        };

        function formatPath(raw) {
            if (!raw) return { label: 'N/A', original: '' };
            if (PATH_LABELS[raw]) return { label: PATH_LABELS[raw], original: raw };
            // Auto-prettify: split on "/", capitalise each segment, join with " › "
            const label = raw
                .split('/')
                .filter(Boolean)
                .map(s => s.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()))
                .join(' › ') || raw;
            return { label, original: raw };
        }

        /** Renders a path as a styled pill with tooltip showing the raw path */
        function pathCell(raw) {
            const { label, original } = formatPath(raw);
            return `<span class="path-pill" title="${original}">${label}</span>`;
        }

        // ─── Period button state ──────────────────────────────────────────────────
        function setPeriod(period) {
            if (period === activePeriod) return;
            activePeriod = period;

            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.period === period);
            });
            document.getElementById('chartBadge').textContent = PERIOD_LABELS[period];

            fetchAnalyticsData();
        }

        // ─── Fetch (real API or mock) ─────────────────────────────────────────────
        async function fetchAnalyticsData() {
            setTableLoading();
            try {
                let data;
                if (USE_MOCK) {
                    // Client-side mock: filter MOCK_ALL by the selected period
                    const cutoff = periodCutoff(activePeriod);
                    data = cutoff
                        ? MOCK_ALL.filter(r => new Date(r.created_at) >= cutoff)
                        : MOCK_ALL;
                } else {
                    // Real API — swap USE_MOCK to false when NestJS is ready
                    const response = await fetch(`${API_ENDPOINT}?period=${activePeriod}`);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    data = await response.json();
                }
                renderDashboard(data);
            } catch (error) {
                console.error('Error fetching analytics data:', error);
                document.getElementById('tableBody').innerHTML =
                    '<tr class="state-row"><td colspan="4" class="error-text"><i class="fa-solid fa-triangle-exclamation" style="margin-right:8px"></i>Failed to load data. Please try again.</td></tr>';
            }
        }

        /** Returns the Date cutoff for a period, or null for "all" */
        function periodCutoff(period) {
            const now = new Date();
            if (period === 'today') { const s = new Date(now); s.setHours(0,0,0,0); return s; }
            if (period === '7d')  { const d = new Date(now); d.setDate(d.getDate()-7);  return d; }
            if (period === '14d') { const d = new Date(now); d.setDate(d.getDate()-14); return d; }
            if (period === '30d') { const d = new Date(now); d.setDate(d.getDate()-30); return d; }
            return null; // 'all'
        }

        function setTableLoading() {
            document.getElementById('tableBody').innerHTML =
                '<tr class="state-row"><td colspan="4"><i class="fa-solid fa-circle-notch fa-spin" style="margin-right:8px;color:var(--accent-blue)"></i>Loading…</td></tr>';
        }

        // ─── Country flag image (flagcdn.com) ───────────────────────────────────
        // Unicode regional indicators don't render as flags on Windows — use images instead.
        function flagImg(code, size = 20) {
            if (!code || code.length !== 2) return '';
            const c = code.toLowerCase();
            return `<img src="https://flagcdn.com/${size}x${Math.round(size * 0.75)}/${c}.png"
                         alt="${code}" title="${code}"
                         style="border-radius:2px;vertical-align:middle;margin-right:5px;"
                         onerror="this.style.display='none'">`;
        }

        function countryCell(code) {
            return `<span class="country-badge" title="${code || 'Unknown'}">${flagImg(code, 16)}${code || 'N/A'}</span>`;
        }

        // ─── Relative time ─────────────────────────────────────────────────────
        function relativeTime(isoStr) {
            const diff = Date.now() - new Date(isoStr).getTime();
            const m = Math.floor(diff / 60000);
            const h = Math.floor(diff / 3600000);
            const d = Math.floor(diff / 86400000);
            if (m < 1)  return '<span style="color:var(--accent-emerald);font-weight:600">just now</span>';
            if (m < 60) return `${m}m ago`;
            if (h < 24) return `${h}h ago`;
            if (d < 7)  return `${d}d ago`;
            return new Date(isoStr).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
        }

        // ─── Referrer chip (domain + favicon) ───────────────────────────────────────
        function referrerChip(url) {
            if (!url) return '<span class="direct-label">📥 Direct</span>';
            try {
                const u = new URL(url);
                const domain = u.hostname.replace(/^www\./, '');
                const favicon = `https://www.google.com/s2/favicons?sz=16&domain=${u.hostname}`;
                return `<a class="referrer-chip" href="${url}" target="_blank" rel="noopener" title="${url}">
                    <img class="referrer-favicon" src="${favicon}" alt="" onerror="this.style.display='none'">
                    ${domain}
                </a>`;
            } catch { return `<span class="direct-label">${url}</span>`; }
        }

        // ─── Trend badge (period-over-period) ─────────────────────────────────────
        function trendHTML(current, previous) {
            if (previous === 0) return current > 0
                ? '<span class="trend-up">↑ New</span>'
                : '<span class="trend-flat">→ No data</span>';
            const pct = Math.round(((current - previous) / previous) * 100);
            if (pct > 0)  return `<span class="trend-up">↑ ${pct}% vs prev period</span>`;
            if (pct < 0)  return `<span class="trend-down">↓ ${Math.abs(pct)}% vs prev period</span>`;
            return `<span class="trend-flat">→ No change vs prev period</span>`;
        }

        function getPreviousPeriodData() {
            const cutoff = periodCutoff(activePeriod);
            if (!cutoff || activePeriod === 'all') return [];
            const days = { today:1, '7d':7, '14d':14, '30d':30 }[activePeriod] || 7;
            const prevEnd   = new Date(cutoff);
            const prevStart = new Date(cutoff); prevStart.setDate(prevStart.getDate() - days);
            return MOCK_ALL.filter(r => {
                const t = new Date(r.created_at);
                return t >= prevStart && t < prevEnd;
            });
        }

        function renderDashboard(data) {
            if (!data || data.length === 0) {
                // Empty state
                document.getElementById('kpiTotalViews').innerText    = '0';
                document.getElementById('kpiUniqueVisitors').innerText = '0';
                document.getElementById('kpiTopCountry').innerText     = '—';
                document.getElementById('kpiTopPage').innerText        = '—';
                ['trendViews','trendVisitors','trendCountry','trendPage'].forEach(id =>
                    document.getElementById(id).innerHTML = '');
                document.getElementById('tableBody').innerHTML =
                    `<tr><td colspan="4"><div class="empty-state">
                        <i class="fa-solid fa-chart-simple"></i>
                        <strong>No traffic data for this period</strong>
                        <p>Try selecting a wider time range above.</p>
                    </div></td></tr>`;
                document.getElementById('rowCount').textContent = '0 entries';
                return;
            }

            // 1. Calculate KPIs
            const totalViews     = data.length;
            const uniqueVisitors = new Set(data.map(item => item.visitor_hash)).size;

            const countryCounts = data.reduce((acc, curr) => {
                acc[curr.country] = (acc[curr.country] || 0) + 1; return acc;
            }, {});
            const topCountry = Object.keys(countryCounts).reduce((a, b) =>
                countryCounts[a] > countryCounts[b] ? a : b
            );

            const pageCounts = data.reduce((acc, curr) => {
                acc[curr.path] = (acc[curr.path] || 0) + 1; return acc;
            }, {});
            const topPage = Object.keys(pageCounts).reduce((a, b) =>
                pageCounts[a] > pageCounts[b] ? a : b
            );

            // Previous period for trend comparison
            const prev = getPreviousPeriodData();
            const prevViews    = prev.length;
            const prevVisitors = new Set(prev.map(r => r.visitor_hash)).size;

            animateCount('kpiTotalViews',    totalViews);
            animateCount('kpiUniqueVisitors', uniqueVisitors);
            document.getElementById('kpiTopCountry').innerHTML =
                `${flagImg(topCountry, 24)}<span style="vertical-align:middle">${topCountry}</span>`;
            document.getElementById('kpiTopPage').innerText = formatPath(topPage).label;

            // Trend badges
            document.getElementById('trendViews').innerHTML    = trendHTML(totalViews, prevViews);
            document.getElementById('trendVisitors').innerHTML = trendHTML(uniqueVisitors, prevVisitors);
            document.getElementById('trendCountry').innerHTML  =
                `<span class="trend-flat">${Object.keys(countryCounts).length} countries reached</span>`;
            document.getElementById('trendPage').innerHTML =
                `<span class="trend-flat">${pageCounts[topPage]} views this period</span>`;

            // 2. Populate Table
            renderTable(data);
            window._lastData = data;

            // 3. Render Chart
            const sortedForChart = [...data].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            renderChart(sortedForChart);
        }

        // ─── Group-by state ───────────────────────────────────────────────────────
        let activeGroup = 'none';

        function setGroup(group) {
            if (group === activeGroup) return;
            activeGroup = group;
            document.querySelectorAll('.group-btn').forEach(btn =>
                btn.classList.toggle('active', btn.dataset.group === group)
            );
            if (window._lastData) renderTable(window._lastData);
        }

        // ─── renderTable dispatcher ───────────────────────────────────────────────
        function renderTable(data) {
            if (activeGroup === 'none') {
                renderRawTable(data);
            } else {
                renderGroupedTable(data, activeGroup);
            }
        }

        // ─── Raw mode: newest-first log ───────────────────────────────────────────
        function renderRawTable(data) {
            const thead = document.querySelector('#trafficTable thead tr');
            thead.innerHTML = '<th>Path</th><th>Source</th><th>Country</th><th>When</th>';

            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            const sorted = [...data].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            document.getElementById('rowCount').textContent = `${sorted.length} entries`;
            window._rawRows = sorted;

            sorted.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.style.animationDelay = `${index * 0.04}s`;
                tr.innerHTML = `
                    <td>${pathCell(row.path)}</td>
                    <td>${referrerChip(row.referrer)}</td>
                    <td>${countryCell(row.country)}</td>
                    <td><span class="time-str" title="${new Date(row.created_at).toLocaleString('en-GB')}">${relativeTime(row.created_at)}</span></td>
                `;
                tableBody.appendChild(tr);
            });
        }


        // ─── Grouped mode: aggregate by key field ─────────────────────────────────
        function renderGroupedTable(data, groupField) {
            // Build aggregated map
            const groups = {};
            data.forEach(row => {
                const key = groupField === 'referrer'
                    ? (row.referrer || '(Direct)')
                    : (row[groupField] || 'N/A');

                if (!groups[key]) {
                    groups[key] = { views: 0, visitors: new Set(), paths: {}, countries: {}, referrers: {} };
                }
                groups[key].views++;
                groups[key].visitors.add(row.visitor_hash);
                groups[key].paths[row.path]       = (groups[key].paths[row.path] || 0) + 1;
                groups[key].countries[row.country] = (groups[key].countries[row.country] || 0) + 1;
                groups[key].referrers[row.referrer || '(Direct)'] =
                    (groups[key].referrers[row.referrer || '(Direct)'] || 0) + 1;
            });

            // Sort by views desc
            const sorted = Object.entries(groups).sort((a, b) => b[1].views - a[1].views);
            const maxViews = sorted[0]?.[1].views || 1;

            // Column headers per group mode
            const colHeaders = {
                path:     ['Page Path',   'Views', 'Unique Visitors', 'Top Country'],
                referrer: ['Referrer',    'Views', 'Unique Visitors', 'Top Page'],
                country:  ['Country',     'Views', 'Unique Visitors', 'Top Page'],
            };

            const thead = document.querySelector('#trafficTable thead tr');
            thead.innerHTML = colHeaders[groupField].map(h => `<th>${h}</th>`).join('');

            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            document.getElementById('rowCount').textContent = `${sorted.length} groups`;

            sorted.forEach(([key, agg], index) => {
                const tr = document.createElement('tr');
                tr.style.animationDelay = `${index * 0.04}s`;

                const barWidth = Math.round((agg.views / maxViews) * 120);
                const viewsCell = `
                    <div class="count-bar-wrap">
                        <div class="count-bar" style="width:${barWidth}px"></div>
                        <span class="count-num">${agg.views}</span>
                    </div>`;
                const uniqueV = agg.visitors.size;

                let col1, col4;
                if (groupField === 'path') {
                    col1 = pathCell(key);
                    const topCo = Object.entries(agg.countries).sort((a,b) => b[1]-a[1])[0]?.[0] || 'N/A';
                    col4 = countryCell(topCo);
                } else if (groupField === 'referrer') {
                    col1 = referrerChip(key === '(Direct)' ? null : key);
                    const topPg = Object.entries(agg.paths).sort((a,b) => b[1]-a[1])[0]?.[0] || 'N/A';
                    col4 = pathCell(topPg);
                } else { // country
                    col1 = countryCell(key);
                    const topPg2 = Object.entries(agg.paths).sort((a,b) => b[1]-a[1])[0]?.[0] || 'N/A';
                    col4 = pathCell(topPg2);
                }

                tr.innerHTML = `<td>${col1}</td><td>${viewsCell}</td><td>${uniqueV}</td><td>${col4}</td>`;
                tableBody.appendChild(tr);
            });
        }

        // ─── Search filter (raw mode only) ─────────────────────────────────────────────
        function applySearch() {
            const q = document.getElementById('tableSearch').value.toLowerCase().trim();
            if (activeGroup !== 'none') return; // search only applies to raw mode
            if (!window._lastData) return;

            const filtered = q
                ? window._lastData.filter(r =>
                    (r.path || '').toLowerCase().includes(q) ||
                    (r.referrer || '').toLowerCase().includes(q) ||
                    (r.country || '').toLowerCase().includes(q)
                  )
                : window._lastData;

            renderRawTable(filtered);
            document.getElementById('rowCount').textContent =
                q ? `${filtered.length} of ${window._lastData.length}` : `${filtered.length} entries`;
        }

        // ─── CSV export ────────────────────────────────────────────────────────────
        function exportCSV() {
            const data = window._lastData;
            if (!data || data.length === 0) return;
            const rows = [
                ['ID', 'Path', 'Page Name', 'Referrer', 'Country', 'Timestamp'],
                ...data.map(r => [
                    r.id,
                    r.path,
                    formatPath(r.path).label,
                    r.referrer || 'Direct',
                    r.country || 'N/A',
                    new Date(r.created_at).toISOString()
                ])
            ];
            const csv = rows.map(row =>
                row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')
            ).join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href = url;
            a.download = `analytics_${activePeriod}_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function renderChart(data) {
            const ctx = document.getElementById('trafficChart').getContext('2d');

            // Group by path for chart — use friendly labels
            const pathCounts = data.reduce((acc, curr) => {
                const label = formatPath(curr.path).label;
                acc[label] = (acc[label] || 0) + 1;
                return acc;
            }, {});

            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(pathCounts),
                    datasets: [{
                        label: 'Views per Page',
                        data: Object.values(pathCounts),
                        backgroundColor: [
                            'rgba(59,130,246,0.75)',
                            'rgba(139,92,246,0.75)',
                            'rgba(16,185,129,0.75)',
                            'rgba(245,158,11,0.75)',
                            'rgba(236,72,153,0.75)',
                        ],
                        borderColor: [
                            'rgba(59,130,246,1)',
                            'rgba(139,92,246,1)',
                            'rgba(16,185,129,1)',
                            'rgba(245,158,11,1)',
                            'rgba(236,72,153,1)',
                        ],
                        borderWidth: 1,
                        borderRadius: 8,
                        borderSkipped: false,
                        barThickness: 36,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 700, easing: 'easeOutQuart' },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1e2437',
                            titleColor: '#f0f4ff',
                            bodyColor: '#8b96b0',
                            borderColor: 'rgba(255,255,255,0.1)',
                            borderWidth: 1,
                            padding: 12,
                            cornerRadius: 8,
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#4e5a72', stepSize: 1 },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            border: { color: 'rgba(255,255,255,0.05)' }
                        },
                        x: {
                            ticks: { color: '#8b96b0', font: { family: 'Courier New', size: 12 } },
                            grid: { display: false },
                            border: { color: 'rgba(255,255,255,0.05)' }
                        }
                    }
                }
            });
        }

        // Smooth count-up animation
        function animateCount(id, target) {
            const el = document.getElementById(id);
            el.classList.add('counting');
            let current = 0;
            const step = Math.ceil(target / 30);
            const timer = setInterval(() => {
                current = Math.min(current + step, target);
                el.innerText = current;
                if (current >= target) {
                    clearInterval(timer);
                    el.classList.remove('counting');
                }
            }, 30);
        }

        // Refresh handler
        function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            updateTimestamp();
            fetchAnalyticsData().finally(() => {
                setTimeout(() => btn.classList.remove('spinning'), 500);
            });
        }

        function updateTimestamp() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('lastUpdated').innerHTML =
                `<span class="pulse-dot"></span> Updated at ${timeStr}`;
        }

        // Init
        document.getElementById('chartBadge').textContent = PERIOD_LABELS[activePeriod];
        fetchAnalyticsData();
        updateTimestamp();
    </script>
</body>
</html>
